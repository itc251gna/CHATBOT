# Server block for the unified KAI Docker Nginx edge.
# Install inside /home/kmh251/deployment/kai_app/nginx.conf under the http {}
# block, then reload the kai-nginx container.
#
# Chatty must be attached to the external Docker network kai_app_default with
# the alias "chatty". The current docker-compose.yml does that through the
# kai_ingress external network.

server {
    listen 443 ssl http2;
    server_name chatty chatty.251gh.local chatbot chatbot.251gh.local;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 8m;

    location / {
        proxy_pass http://chatty:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
